## Render Blueprint — https://render.com/docs/blueprint-spec
## Deploy: Render dashboard → New → Blueprint → conectar leonardeco/saas-boilerplate
##
## Dominios personalizados:
##   Web → app.ganancia.app
##   API → api.ganancia.app
##
## DNS a configurar en tu registrador (ver instrucciones en DEPLOY.md):
##   CNAME  app  →  saas-web.onrender.com
##   CNAME  api  →  saas-api.onrender.com
##
## Si el Blueprint no genera JWT_ACCESS_SECRET / JWT_REFRESH_SECRET automáticamente,
## agrégalos manualmente en Render → saas-api → Environment con:
##   node -e "console.log(require('crypto').randomBytes(32).toString('base64'))"
##
## Variables que requieren acción manual después del primer deploy (sync: false):
##   STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET
##   RESEND_API_KEY
##   GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
##   GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET

databases:
  - name: saas-db
    plan: free
    databaseName: saas_boilerplate
    user: saas_admin

services:
  # ─── API (Fastify) — api.ganancia.app ───────────────────────────────────────
  - type: web
    name: saas-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    domains:
      - api.ganancia.app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: saas-db
          property: connectionString

      - key: JWT_ACCESS_SECRET
        generateValue: true

      - key: JWT_REFRESH_SECRET
        generateValue: true

      - key: NODE_ENV
        value: production

      - key: API_HOST
        value: 0.0.0.0

      - key: CORS_ORIGIN
        value: https://app.ganancia.app

      - key: WEB_URL
        value: https://app.ganancia.app

      - key: EMAIL_FROM
        value: no-reply@ganancia.app

      # Stripe — opcional, billing devuelve 503 cuando no está configurado
      - key: STRIPE_SECRET_KEY
        sync: false

      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # Email (Resend) — opcional, cae a Ethereal preview si no está
      - key: RESEND_API_KEY
        sync: false

      # OAuth Google — opcional
      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_CLIENT_SECRET
        sync: false

      # OAuth GitHub — opcional
      - key: GITHUB_CLIENT_ID
        sync: false

      - key: GITHUB_CLIENT_SECRET
        sync: false

  # ─── Web (Next.js) — app.ganancia.app ───────────────────────────────────────
  - type: web
    name: saas-web
    runtime: docker
    dockerfilePath: apps/web/Dockerfile
    dockerContext: .
    plan: free
    domains:
      - app.ganancia.app
    envVars:
      - key: JWT_ACCESS_SECRET
        fromService:
          type: web
          name: saas-api
          envVarKey: JWT_ACCESS_SECRET

      - key: NEXT_PUBLIC_API_URL
        value: https://api.ganancia.app

      - key: NODE_ENV
        value: production
