# Railway config for the Web service
# In the Railway dashboard: set "Root Directory" to / and "Dockerfile Path" to apps/web/Dockerfile
# See: https://docs.railway.com/deploy/dockerfiles

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
