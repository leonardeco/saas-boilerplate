<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#06b6d4" />
  <title>NightTable CO</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: system-ui, sans-serif; background: #020617; color: #e2e8f0;
      padding: env(safe-area-inset-top) 1.5rem env(safe-area-inset-bottom);
    }
    .card {
      max-width: 22rem; text-align: center;
      border: 1px solid #1e293b; border-radius: 1rem; padding: 2rem 1.5rem;
      background: #0f172a;
    }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; color: #fff; }
    p { color: #94a3b8; font-size: 0.95rem; line-height: 1.5; }
    a {
      display: inline-block; margin-top: 1.25rem; padding: 0.75rem 1.25rem;
      background: #06b6d4; color: #020617; border-radius: 0.75rem;
      text-decoration: none; font-weight: 600;
    }
    .mark { color: #22d3ee; letter-spacing: 0.08em; font-size: 0.75rem; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">NightTable CO</div>
    <h1>Food & Nightlife</h1>
    <p>Shell nativo listo. Configura <code>CAPACITOR_SERVER_URL</code> hacia la web Next o abre la app desplegada.</p>
    <a id="open" href="https://nighttable.co">Abrir web</a>
  </div>
  <script>
    // Prefer env-injected production web if present
    const prod = localStorage.getItem('NT_WEB_URL') || 'https://app.nighttable.co';
    document.getElementById('open').href = prod;
    // Deep link handler bridge
    document.addEventListener('DOMContentLoaded', () => {
      if (window.Capacitor?.Plugins?.App) {
        window.Capacitor.Plugins.App.addListener('appUrlOpen', (data) => {
          console.log('[deeplink]', data.url);
        });
      }
    });
  </script>
</body>
</html>
