# Example production-like stack (single host). Prefer managed PG/Redis in real prod.
# cp docker-compose.prod.example.yml docker-compose.prod.yml
# fill .env.production then: docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nighttable}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set password}
      POSTGRES_DB: ${POSTGRES_DB:-nighttable_db}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nighttable}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.11
    restart: unless-stopped
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?set meili key}
    volumes:
      - meili_data:/meili_data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      TRUST_PROXY: "true"
      COOKIE_SECURE: "true"
      DATABASE_URL: postgresql://${POSTGRES_USER:-nighttable}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nighttable_db}
      REDIS_URL: redis://redis:6379
      MEILI_HOST: http://meilisearch:7700
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-nighttable}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nighttable_db}
      REDIS_URL: redis://redis:6379
      MEILI_HOST: http://meilisearch:7700
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_NAME: NightTable CO
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pg_data:
  redis_data:
  meili_data:
