<svg width="1280" height="400" viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <linearGradient id="pillBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <circle cx="200" cy="150" r="180" fill="#3b82f6" opacity="0.08" filter="url(#blur)"/>
  <circle cx="1100" cy="280" r="200" fill="#06b6d4" opacity="0.08" filter="url(#blur)"/>
  <circle cx="640" cy="380" r="220" fill="#6366f1" opacity="0.06" filter="url(#blur)"/>

  <!-- Grid lines -->
  <g stroke="#3b82f6" stroke-width="0.5" opacity="0.07">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/>
    <line x1="1120" y1="0" x2="1120" y2="400"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="2" fill="url(#lineGrad)" opacity="0.6"/>

  <!-- Rocket icon group -->
  <g transform="translate(520, 110)">
    <circle cx="0" cy="0" r="36" fill="#3b82f6" opacity="0.15"/>
    <circle cx="0" cy="0" r="28" fill="#3b82f6" opacity="0.2"/>
    <!-- rocket body -->
    <path d="M0,-18 C8,-18 16,-8 16,4 L16,14 L-16,14 L-16,4 C-16,-8 -8,-18 0,-18 Z" fill="#60a5fa"/>
    <!-- rocket window -->
    <circle cx="0" cy="0" r="5" fill="#0f172a" stroke="#93c5fd" stroke-width="1.5"/>
    <!-- rocket fins -->
    <path d="M-16,8 L-24,18 L-16,14 Z" fill="#3b82f6"/>
    <path d="M16,8 L24,18 L16,14 Z" fill="#3b82f6"/>
    <!-- rocket fire -->
    <path d="M-8,14 Q0,26 8,14" fill="#f59e0b" opacity="0.9"/>
    <path d="M-5,14 Q0,22 5,14" fill="#fbbf24"/>
  </g>

  <!-- Main title -->
  <text x="640" y="198" font-family="'Segoe UI', system-ui, sans-serif" font-size="52" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-1">SaaS Boilerplate</text>

  <!-- Accent line under title -->
  <rect x="490" y="210" width="300" height="2" rx="1" fill="url(#lineGrad)" opacity="0.8"/>

  <!-- Subtitle -->
  <text x="640" y="248" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" fill="#93c5fd" text-anchor="middle" opacity="0.9">Production-ready monorepo para lanzar cualquier SaaS en dias</text>

  <!-- Tech pills -->
  <g transform="translate(640, 295)" text-anchor="middle">

    <!-- Next.js pill -->
    <g transform="translate(-300, 0)">
      <rect x="-38" y="-14" width="76" height="28" rx="14" fill="url(#pillBg)" stroke="#3b82f6" stroke-width="0.5" stroke-opacity="0.4"/>
      <text font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#93c5fd" font-weight="600">Next.js 15</text>
    </g>

    <!-- Fastify pill -->
    <g transform="translate(-195, 0)">
      <rect x="-36" y="-14" width="72" height="28" rx="14" fill="url(#pillBg)" stroke="#3b82f6" stroke-width="0.5" stroke-opacity="0.4"/>
      <text font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#93c5fd" font-weight="600">Fastify 5</text>
    </g>

    <!-- PostgreSQL pill -->
    <g transform="translate(-85, 0)">
      <rect x="-48" y="-14" width="96" height="28" rx="14" fill="url(#pillBg)" stroke="#3b82f6" stroke-width="0.5" stroke-opacity="0.4"/>
      <text font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#93c5fd" font-weight="600">PostgreSQL</text>
    </g>

    <!-- Stripe pill -->
    <g transform="translate(30, 0)">
      <rect x="-30" y="-14" width="60" height="28" rx="14" fill="url(#pillBg)" stroke="#3b82f6" stroke-width="0.5" stroke-opacity="0.4"/>
      <text font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#93c5fd" font-weight="600">Stripe</text>
    </g>

    <!-- Drizzle pill -->
    <g transform="translate(135, 0)">
      <rect x="-34" y="-14" width="68" height="28" rx="14" fill="url(#pillBg)" stroke="#3b82f6" stroke-width="0.5" stroke-opacity="0.4"/>
      <text font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#93c5fd" font-weight="600">Drizzle ORM</text>
    </g>

    <!-- Docker pill -->
    <g transform="translate(240, 0)">
      <rect x="-30" y="-14" width="60" height="28" rx="14" fill="url(#pillBg)" stroke="#3b82f6" stroke-width="0.5" stroke-opacity="0.4"/>
      <text font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#93c5fd" font-weight="600">Docker</text>
    </g>

    <!-- Turborepo pill -->
    <g transform="translate(340, 0)">
      <rect x="-42" y="-14" width="84" height="28" rx="14" fill="url(#pillBg)" stroke="#3b82f6" stroke-width="0.5" stroke-opacity="0.4"/>
      <text font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#93c5fd" font-weight="600">Turborepo</text>
    </g>

  </g>

  <!-- Author line -->
  <text x="640" y="360" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#475569" text-anchor="middle">by Leonardo Guzman · github.com/leonardeco</text>

  <!-- Bottom accent line -->
  <rect x="0" y="398" width="1280" height="2" fill="url(#lineGrad)" opacity="0.4"/>
</svg>
