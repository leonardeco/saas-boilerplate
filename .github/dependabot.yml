version: 2
updates:
  # ─── Root / shared npm packages ────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Bogota"
    open-pull-requests-limit: 10
    groups:
      typescript-tooling:
        patterns:
          - "typescript"
          - "@types/*"
          - "turbo"
          - "prettier"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "c8"
      drizzle:
        patterns:
          - "drizzle-orm"
          - "drizzle-kit"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"

  # ─── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Bogota"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(deps)"
