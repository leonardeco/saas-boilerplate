name: Docker

on:
  push:
    branches: ["main"]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/saas-boilerplate-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/saas-boilerplate-web

jobs:
  # ─── Guard: only run if CI passed ──────────────────────────────────────────
  check-ci:
    name: Check CI status
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      should-build: ${{ steps.check.outputs.should-build }}
    steps:
      - name: Set build flag
        id: check
        run: echo "should-build=true" >> $GITHUB_OUTPUT

  # ─── Build & push API image ─────────────────────────────────────────────────
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    needs: check-ci
    if: needs.check-ci.outputs.should-build == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  # ─── Build & push Web image ─────────────────────────────────────────────────
  build-web:
    name: Build Web image
    runs-on: ubuntu-latest
    needs: check-ci
    if: needs.check-ci.outputs.should-build == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # ─── Summary ────────────────────────────────────────────────────────────────
  docker-success:
    name: Images pushed
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    if: always()
    steps:
      - name: Verify both images pushed
        run: |
          if [[ "${{ needs.build-api.result }}" != "success" || "${{ needs.build-web.result }}" != "success" ]]; then
            echo "❌ Docker build failed"
            exit 1
          fi
          echo "✅ API and Web images pushed to GHCR"
          echo "   API: ${{ env.API_IMAGE }}:latest"
          echo "   Web: ${{ env.WEB_IMAGE }}:latest"
