name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Unit tests (domain + contracts)
        run: |
          npm test -w @saas/domain
          npm test -w @saas/contracts
      - name: Typecheck packages
        run: |
          npm run lint -w @saas/domain || true
          npm run lint -w @saas/contracts || true
